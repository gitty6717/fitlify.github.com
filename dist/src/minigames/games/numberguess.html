<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .game-title {
            font-size: 2rem;
            color: #10b981;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .range-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .range-btn {
            padding: 8px 16px;
            border: 2px solid #334155;
            background: #141b2d;
            color: #f8fafc;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .range-btn.active {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .game-container {
            background: #141b2d;
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid #334155;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .target-display {
            font-size: 4rem;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }

        .range-info {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        .input-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        input[type="number"] {
            flex: 1;
            padding: 1rem;
            font-size: 1.25rem;
            border: 2px solid #334155;
            border-radius: 12px;
            background: #0f172a;
            color: #f8fafc;
            text-align: center;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #10b981;
        }

        button {
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-guess {
            background: #10b981;
            color: #0a0e1a;
        }

        .btn-guess:hover {
            background: #34d399;
        }

        .feedback {
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-weight: 600;
            font-size: 1.125rem;
        }

        .feedback.too-high {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid #ef4444;
        }

        .feedback.too-low {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid #fbbf24;
        }

        .feedback.correct {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid #10b981;
        }

        .attempts-counter {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .attempts-counter span {
            color: #10b981;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .history {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }

        .history h3 {
            font-size: 0.875rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }

        .guess-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }

        .guess-chip {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .guess-chip.high {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .guess-chip.low {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }

        .stat-box {
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn-secondary {
            background: #1e2538;
            color: #f8fafc;
            border: 2px solid #334155;
        }

        .btn-secondary:hover {
            border-color: #10b981;
        }

        .win-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #141b2d;
            border: 2px solid #10b981;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            z-index: 100;
            transition: transform 0.3s ease;
            min-width: 350px;
        }

        .win-modal.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .win-modal h2 {
            color: #10b981;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .win-stats {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        .best-attempts {
            color: #fbbf24;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="game-title">❓ Number Guess</h1>
        <p class="subtitle">Guess the number in as few attempts as possible!</p>
        <div class="range-selector">
            <button class="range-btn active" data-range="50">1-50</button>
            <button class="range-btn" data-range="100">1-100</button>
            <button class="range-btn" data-range="500">1-500</button>
        </div>
    </div>

    <div class="game-container">
        <div class="target-display">?</div>
        <div class="range-info">I'm thinking of a number between <strong id="min-val">1</strong> and <strong id="max-val">50</strong></div>
        
        <div class="attempts-counter">
            Attempts: <span id="attempts">0</span>
        </div>

        <div class="input-section">
            <input type="number" id="guess-input" placeholder="?" min="1">
            <button class="btn-guess" onclick="makeGuess()">Guess!</button>
        </div>

        <div id="feedback"></div>

        <div class="history">
            <h3>Previous Guesses</h3>
            <div class="guess-list" id="guess-list"></div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-value" id="games-won">0</div>
                <div class="stat-label">Won</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="avg-attempts">-</div>
                <div class="stat-label">Avg Attempts</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="best-attempts">-</div>
                <div class="stat-label">Best</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-secondary" onclick="newGame()">🔄 New Game</button>
        <button class="btn-secondary" onclick="resetStats()">Reset Stats</button>
    </div>

    <div class="win-modal" id="win-modal">
        <h2>🎉 Correct!</h2>
        <div class="win-stats">The number was <span id="win-number"></span></div>
        <div class="win-stats">Attempts: <span id="win-attempts"></span></div>
        <div class="best-attempts" id="best-attempts-msg"></div>
        <button class="btn-guess" onclick="newGame()">Play Again</button>
    </div>

    <script>
        // Game State
        let targetNumber = 0;
        let attempts = 0;
        let maxRange = 50;
        let gameActive = true;
        let guesses = [];
        let stats = {
            gamesWon: 0,
            totalAttempts: 0,
            bestAttempts: null
        };

        function loadStats() {
            const saved = localStorage.getItem('numberguess_stats');
            if (saved) {
                stats = JSON.parse(saved);
                updateStatsDisplay();
            }
        }

        function saveStats() {
            localStorage.setItem('numberguess_stats', JSON.stringify(stats));
        }

        function updateStatsDisplay() {
            document.getElementById('games-won').textContent = stats.gamesWon;
            document.getElementById('avg-attempts').textContent = 
                stats.gamesWon > 0 ? (stats.totalAttempts / stats.gamesWon).toFixed(1) : '-';
            document.getElementById('best-attempts').textContent = 
                stats.bestAttempts || '-';
        }

        function resetStats() {
            stats = { gamesWon: 0, totalAttempts: 0, bestAttempts: null };
            saveStats();
            updateStatsDisplay();
        }

        function newGame() {
            targetNumber = Math.floor(Math.random() * maxRange) + 1;
            attempts = 0;
            gameActive = true;
            guesses = [];
            
            document.getElementById('guess-input').value = '';
            document.getElementById('guess-input').max = maxRange;
            document.getElementById('attempts').textContent = '0';
            document.getElementById('feedback').innerHTML = '';
            document.getElementById('guess-list').innerHTML = '';
            document.getElementById('win-modal').classList.remove('show');
            
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('min-val').textContent = '1';
            document.getElementById('max-val').textContent = maxRange;
        }

        function makeGuess() {
            if (!gameActive) return;
            
            const input = document.getElementById('guess-input');
            const guess = parseInt(input.value);
            
            if (isNaN(guess) || guess < 1 || guess > maxRange) {
                showFeedback('Enter a number between 1 and ' + maxRange, 'invalid');
                return;
            }
            
            attempts++;
            guesses.push({ number: guess, high: guess > targetNumber });
            
            document.getElementById('attempts').textContent = attempts;
            updateGuessList();
            
            if (guess === targetNumber) {
                gameWon();
            } else if (guess > targetNumber) {
                showFeedback('📉 Too High!', 'too-high');
            } else {
                showFeedback('📈 Too Low!', 'too-low');
            }
            
            input.value = '';
            input.focus();
        }

        function showFeedback(message, type) {
            const feedback = document.getElementById('feedback');
            feedback.innerHTML = `<div class="feedback ${type}">${message}</div>`;
        }

        function updateGuessList() {
            const list = document.getElementById('guess-list');
            list.innerHTML = guesses.map(g => `
                <span class="guess-chip ${g.high ? 'high' : 'low'}">
                    ${g.number} ${g.high ? '↓' : '↑'}
                </span>
            `).join('');
        }

        function gameWon() {
            gameActive = false;
            
            // Update stats
            stats.gamesWon++;
            stats.totalAttempts += attempts;
            
            if (!stats.bestAttempts || attempts < stats.bestAttempts) {
                stats.bestAttempts = attempts;
            }
            
            saveStats();
            updateStatsDisplay();
            
            // Show win modal
            document.getElementById('win-number').textContent = targetNumber;
            document.getElementById('win-attempts').textContent = attempts;
            
            const bestMsg = document.getElementById('best-attempts-msg');
            if (attempts === stats.bestAttempts) {
                bestMsg.textContent = '🏆 New Best Score!';
            } else {
                bestMsg.textContent = `Best: ${stats.bestAttempts} attempts`;
            }
            
            document.getElementById('win-modal').classList.add('show');
            
            // Submit score (lower is better for this game)
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'gameScore',
                    gameId: 'numberGuess',
                    score: attempts,
                    attempts: attempts
                }, '*');
            }
        }

        // Range selector
        document.querySelectorAll('.range-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.range-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                maxRange = parseInt(btn.dataset.range);
                newGame();
            });
        });

        // Enter key support
        document.getElementById('guess-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') makeGuess();
        });

        // Initialize
        loadStats();
        newGame();
    </script>
</body>
</html>
