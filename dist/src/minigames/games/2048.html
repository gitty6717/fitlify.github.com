<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 Puzzle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .game-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #10b981;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 1rem;
        }

        .score-container {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }

        .score-box {
            background: #141b2d;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 0.75rem 1.5rem;
            text-align: center;
            min-width: 100px;
        }

        .score-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
        }

        .game-board {
            background: #141b2d;
            border-radius: 10px;
            padding: 10px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 10px;
            background: #1e2538;
            border-radius: 6px;
            padding: 10px;
        }

        .grid-cell {
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            transition: all 0.15s ease;
        }

        .tile {
            width: 100%;
            height: 100%;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            animation: appear 0.2s ease;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tile-2 { background: #1e3a5f; color: #f8fafc; }
        .tile-4 { background: #1e4a6f; color: #f8fafc; }
        .tile-8 { background: #10b981; color: #0a0e1a; }
        .tile-16 { background: #0d9488; color: #f8fafc; }
        .tile-32 { background: #059669; color: #f8fafc; }
        .tile-64 { background: #047857; color: #f8fafc; }
        .tile-128 { background: #34d399; color: #0a0e1a; }
        .tile-256 { background: #6ee7b7; color: #0a0e1a; }
        .tile-512 { background: #f59e0b; color: #0a0e1a; }
        .tile-1024 { background: #fbbf24; color: #0a0e1a; font-size: 1.25rem; }
        .tile-2048 { background: linear-gradient(135deg, #10b981, #34d399); color: #0a0e1a; font-size: 1.25rem; animation: glow 2s ease infinite; }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
            50% { box-shadow: 0 0 40px rgba(16, 185, 129, 0.8); }
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #10b981;
            color: #0a0e1a;
        }

        .btn-primary:hover {
            background: #34d399;
        }

        .btn-secondary {
            background: #1e2538;
            color: #f8fafc;
            border: 2px solid #334155;
        }

        .btn-secondary:hover {
            border-color: #10b981;
        }

        .instructions {
            margin-top: 1rem;
            color: #94a3b8;
            font-size: 0.875rem;
            text-align: center;
        }

        .game-over, .game-won {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 26, 0.9);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .game-over.show, .game-won.show {
            opacity: 1;
            visibility: visible;
        }

        .game-over h2 {
            color: #ef4444;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .game-won h2 {
            color: #10b981;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .final-score {
            font-size: 1.5rem;
            color: #f8fafc;
            margin-bottom: 1.5rem;
        }

        .touch-controls {
            display: none;
            margin-top: 1rem;
            grid-template-columns: repeat(3, 60px);
            gap: 10px;
            justify-content: center;
        }

        .touch-btn {
            width: 60px;
            height: 60px;
            background: #1e2538;
            border: 2px solid #334155;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
        }

        .touch-btn:active {
            background: #10b981;
            border-color: #10b981;
        }

        @media (max-width: 480px) {
            .grid-container {
                grid-template-columns: repeat(4, 65px);
                grid-template-rows: repeat(4, 65px);
            }

            .tile {
                font-size: 1.25rem;
            }

            .touch-controls {
                display: grid;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="game-title">2048</h1>
        <p class="subtitle">Merge tiles to reach 2048!</p>
        <div class="score-container">
            <div class="score-box">
                <div class="score-label">Score</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">Best</div>
                <div class="score-value" id="best-score">0</div>
            </div>
        </div>
    </div>

    <div class="game-board">
        <div class="grid-container" id="grid"></div>
        
        <div class="game-over" id="game-over">
            <h2>Game Over!</h2>
            <div class="final-score">Score: <span id="final-score">0</span></div>
            <button class="btn-primary" onclick="restartGame()">Try Again</button>
        </div>
        
        <div class="game-won" id="game-won">
            <h2>🎉 You Won!</h2>
            <div class="final-score">Score: <span id="win-score">0</span></div>
            <button class="btn-primary" onclick="continueGame()">Keep Playing</button>
            <button class="btn-secondary" onclick="restartGame()" style="margin-top: 0.5rem;">New Game</button>
        </div>
    </div>

    <div class="touch-controls">
        <div></div>
        <div class="touch-btn" onclick="move('up')">⬆️</div>
        <div></div>
        <div class="touch-btn" onclick="move('left')">⬅️</div>
        <div class="touch-btn" onclick="move('down')">⬇️</div>
        <div class="touch-btn" onclick="move('right')">➡️</div>
    </div>

    <div class="controls">
        <button class="btn-primary" onclick="restartGame()">🔄 New Game</button>
        <button class="btn-secondary" onclick="undoMove()">↩️ Undo</button>
    </div>

    <p class="instructions">Use arrow keys or swipe to move tiles. Merge matching numbers!</p>

    <script>
        // Game State
        let grid = [];
        let score = 0;
        let bestScore = 0;
        let previousState = null;
        let hasWon = false;

        function initGame() {
            grid = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            hasWon = false;
            previousState = null;
            
            addNewTile();
            addNewTile();
            
            loadBestScore();
            render();
            hideMessages();
        }

        function loadBestScore() {
            bestScore = parseInt(localStorage.getItem('2048_best_score') || '0');
            document.getElementById('best-score').textContent = bestScore;
        }

        function saveBestScore() {
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('2048_best_score', bestScore.toString());
                document.getElementById('best-score').textContent = bestScore;
            }
        }

        function addNewTile() {
            const emptyCells = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            
            if (emptyCells.length === 0) return false;
            
            const {r, c} = emptyCells[Math.floor(Math.random() * emptyCells.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
            return true;
        }

        function render() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    
                    if (grid[r][c] !== 0) {
                        const tile = document.createElement('div');
                        tile.className = `tile tile-${grid[r][c]}`;
                        tile.textContent = grid[r][c];
                        cell.appendChild(tile);
                    }
                    
                    container.appendChild(cell);
                }
            }
            
            document.getElementById('score').textContent = score;
        }

        function saveState() {
            previousState = {
                grid: grid.map(row => [...row]),
                score: score
            };
        }

        function move(direction) {
            saveState();
            
            let moved = false;
            const newGrid = grid.map(row => [...row]);
            
            if (direction === 'left') {
                for (let r = 0; r < 4; r++) {
                    const result = processLine(newGrid[r]);
                    newGrid[r] = result.line;
                    score += result.score;
                    if (result.moved) moved = true;
                }
            } else if (direction === 'right') {
                for (let r = 0; r < 4; r++) {
                    const result = processLine(newGrid[r].reverse());
                    newGrid[r] = result.line.reverse();
                    score += result.score;
                    if (result.moved) moved = true;
                }
            } else if (direction === 'up') {
                for (let c = 0; c < 4; c++) {
                    const col = [newGrid[0][c], newGrid[1][c], newGrid[2][c], newGrid[3][c]];
                    const result = processLine(col);
                    for (let r = 0; r < 4; r++) {
                        newGrid[r][c] = result.line[r];
                    }
                    score += result.score;
                    if (result.moved) moved = true;
                }
            } else if (direction === 'down') {
                for (let c = 0; c < 4; c++) {
                    const col = [newGrid[3][c], newGrid[2][c], newGrid[1][c], newGrid[0][c]];
                    const result = processLine(col);
                    for (let r = 0; r < 4; r++) {
                        newGrid[3-r][c] = result.line[r];
                    }
                    score += result.score;
                    if (result.moved) moved = true;
                }
            }
            
            if (moved) {
                grid = newGrid;
                addNewTile();
                render();
                saveBestScore();
                
                // Check for 2048
                if (!hasWon && grid.some(row => row.some(cell => cell === 2048))) {
                    hasWon = true;
                    showWinMessage();
                }
                
                // Check game over
                if (isGameOver()) {
                    showGameOver();
                }
                
                // Submit score to parent
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'gameScore',
                        gameId: 'puzzle2048',
                        score: score
                    }, '*');
                }
            }
        }

        function processLine(line) {
            let newLine = line.filter(cell => cell !== 0);
            let score = 0;
            let moved = newLine.length !== line.filter(c => c !== 0).length;
            
            for (let i = 0; i < newLine.length - 1; i++) {
                if (newLine[i] === newLine[i + 1]) {
                    newLine[i] *= 2;
                    score += newLine[i];
                    newLine.splice(i + 1, 1);
                    moved = true;
                }
            }
            
            while (newLine.length < 4) {
                newLine.push(0);
            }
            
            return { line: newLine, score, moved };
        }

        function isGameOver() {
            // Check for empty cells
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return false;
                }
            }
            
            // Check for possible merges
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (c < 3 && grid[r][c] === grid[r][c + 1]) return false;
                    if (r < 3 && grid[r][c] === grid[r + 1][c]) return false;
                }
            }
            
            return true;
        }

        function undoMove() {
            if (previousState) {
                grid = previousState.grid.map(row => [...row]);
                score = previousState.score;
                render();
                previousState = null;
            }
        }

        function showWinMessage() {
            document.getElementById('win-score').textContent = score;
            document.getElementById('game-won').classList.add('show');
        }

        function showGameOver() {
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').classList.add('show');
        }

        function hideMessages() {
            document.getElementById('game-over').classList.remove('show');
            document.getElementById('game-won').classList.remove('show');
        }

        function continueGame() {
            document.getElementById('game-won').classList.remove('show');
        }

        function restartGame() {
            initGame();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowLeft': move('left'); e.preventDefault(); break;
                case 'ArrowRight': move('right'); e.preventDefault(); break;
                case 'ArrowUp': move('up'); e.preventDefault(); break;
                case 'ArrowDown': move('down'); e.preventDefault(); break;
            }
        });

        // Touch/Swipe controls
        let touchStartX, touchStartY;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        document.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
            
            touchStartX = touchStartY = null;
        });

        // Initialize
        initGame();
    </script>
</body>
</html>
