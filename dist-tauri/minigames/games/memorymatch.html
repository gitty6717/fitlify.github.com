<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .game-title {
            font-size: 2rem;
            color: #10b981;
            margin-bottom: 0.5rem;
        }

        .game-info {
            display: flex;
            gap: 2rem;
            justify-content: center;
            font-size: 1.125rem;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .info-label {
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #10b981;
        }

        .level-selector {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .level-btn {
            padding: 8px 16px;
            border: 2px solid #334155;
            background: #141b2d;
            color: #f8fafc;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .level-btn.active, .level-btn:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .game-board {
            display: grid;
            gap: 10px;
            padding: 15px;
            background: #141b2d;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1e2538 0%, #252d3d 100%);
            border: 2px solid #334155;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            transform-style: preserve-3d;
        }

        .card:hover:not(.flipped):not(.matched) {
            border-color: #10b981;
            transform: scale(1.05);
        }

        .card.flipped, .card.matched {
            background: #10b981;
            border-color: #10b981;
            transform: rotateY(180deg);
        }

        .card.matched {
            background: #059669;
            animation: matchPulse 0.5s ease;
        }

        @keyframes matchPulse {
            0% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(180deg) scale(1); }
        }

        .card::before {
            content: '❓';
            font-size: 1.5rem;
            color: #475569;
        }

        .card.flipped::before, .card.matched::before {
            display: none;
        }

        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: #10b981;
            color: #0a0e1a;
        }

        .btn-primary:hover {
            background: #34d399;
        }

        .btn-secondary {
            background: #1e2538;
            color: #f8fafc;
            border: 2px solid #334155;
        }

        .btn-secondary:hover {
            border-color: #10b981;
        }

        .best-time {
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid #10b981;
            border-radius: 10px;
            text-align: center;
        }

        .best-time-label {
            color: #94a3b8;
            font-size: 0.875rem;
        }

        .best-time-value {
            color: #10b981;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .win-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: #141b2d;
            border: 2px solid #10b981;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            z-index: 100;
            transition: transform 0.3s ease;
        }

        .win-message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .win-message h2 {
            color: #10b981;
            font-size: 2rem;
            margin-bottom: 1rem;
        }

        .win-message p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        @media (max-width: 480px) {
            .card {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-header">
        <h1 class="game-title">🧠 Memory Match</h1>
        <div class="level-selector">
            <button class="level-btn active" data-level="easy">Easy (4x3)</button>
            <button class="level-btn" data-level="medium">Medium (4x4)</button>
            <button class="level-btn" data-level="hard">Hard (6x4)</button>
        </div>
        <div class="game-info">
            <div class="info-item">
                <span class="info-label">Time</span>
                <span class="info-value" id="timer">00:00</span>
            </div>
            <div class="info-item">
                <span class="info-label">Moves</span>
                <span class="info-value" id="moves">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Pairs</span>
                <span class="info-value" id="pairs">0/6</span>
            </div>
        </div>
    </div>

    <div class="game-board" id="board"></div>

    <div class="best-time">
        <div class="best-time-label">🏆 Best Time</div>
        <div class="best-time-value" id="best-time">--:--</div>
    </div>

    <div class="controls">
        <button class="btn-primary" onclick="restartGame()">🔄 New Game</button>
    </div>

    <div class="win-message" id="win-message">
        <h2>🎉 Complete!</h2>
        <p id="win-stats"></p>
        <button class="btn-primary" onclick="restartGame()">Play Again</button>
    </div>

    <script>
        // Game State
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let timer = 0;
        let timerInterval = null;
        let gameActive = false;
        let currentLevel = 'easy';

        const emojis = ['💪', '🏃', '🎯', '⚡', '🏋️', '🚴', '🧘', '🥗', '💧', '❤️', '🦵', '⏱️'];

        const levels = {
            easy: { rows: 3, cols: 4, pairs: 6 },
            medium: { rows: 4, cols: 4, pairs: 8 },
            hard: { rows: 4, cols: 6, pairs: 12 }
        };

        function initGame() {
            const level = levels[currentLevel];
            const board = document.getElementById('board');
            
            // Setup grid
            board.style.gridTemplateColumns = `repeat(${level.cols}, 80px)`;
            
            // Create card pairs
            cards = [];
            const gameEmojis = emojis.slice(0, level.pairs);
            gameEmojis.forEach(emoji => {
                cards.push({ id: cards.length, emoji, content: emoji });
                cards.push({ id: cards.length, emoji, content: emoji });
            });
            
            // Shuffle
            cards.sort(() => Math.random() - 0.5);
            
            // Render
            board.innerHTML = cards.map((card, index) => `
                <div class="card" data-index="${index}" data-emoji="${card.emoji}" onclick="flipCard(${index})">
                    ${card.content}
                </div>
            `).join('');
            
            // Reset state
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            timer = 0;
            gameActive = true;
            
            updateDisplay();
            startTimer();
            document.getElementById('win-message').classList.remove('show');
        }

        function flipCard(index) {
            const card = document.querySelector(`[data-index="${index}"]`);
            
            if (!gameActive || card.classList.contains('flipped') || card.classList.contains('matched') || flippedCards.length >= 2) {
                return;
            }
            
            card.classList.add('flipped');
            flippedCards.push({ index, emoji: cards[index].emoji });
            
            if (flippedCards.length === 2) {
                moves++;
                checkMatch();
            }
            
            updateDisplay();
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            
            if (card1.emoji === card2.emoji) {
                // Match!
                setTimeout(() => {
                    document.querySelector(`[data-index="${card1.index}"]`).classList.add('matched');
                    document.querySelector(`[data-index="${card2.index}"]`).classList.add('matched');
                    matchedPairs++;
                    flippedCards = [];
                    updateDisplay();
                    
                    if (matchedPairs === levels[currentLevel].pairs) {
                        gameWin();
                    }
                }, 500);
            } else {
                // No match
                setTimeout(() => {
                    document.querySelector(`[data-index="${card1.index}"]`).classList.remove('flipped');
                    document.querySelector(`[data-index="${card2.index}"]`).classList.remove('flipped');
                    flippedCards = [];
                }, 1000);
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameActive) {
                    timer++;
                    updateDisplay();
                }
            }, 1000);
        }

        function updateDisplay() {
            const mins = Math.floor(timer / 60).toString().padStart(2, '0');
            const secs = (timer % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
            document.getElementById('moves').textContent = moves;
            document.getElementById('pairs').textContent = `${matchedPairs}/${levels[currentLevel].pairs}`;
        }

        function gameWin() {
            gameActive = false;
            clearInterval(timerInterval);
            
            const timeMs = timer * 1000;
            const bestTime = getBestTime();
            
            // Check if new record
            let isNewRecord = false;
            if (!bestTime || timeMs < bestTime) {
                saveBestTime(timeMs);
                isNewRecord = true;
            }
            
            // Show win message
            const mins = Math.floor(timer / 60);
            const secs = timer % 60;
            document.getElementById('win-stats').innerHTML = `
                Time: ${mins}m ${secs}s | Moves: ${moves}<br>
                ${isNewRecord ? '🏆 New Record!' : ''}
            `;
            document.getElementById('win-message').classList.add('show');
            
            // Submit score
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'gameScore',
                    gameId: 'memoryMatch',
                    score: timeMs,
                    duration: timeMs,
                    moves: moves
                }, '*');
            }
            
            updateBestTimeDisplay();
        }

        function restartGame() {
            clearInterval(timerInterval);
            initGame();
        }

        function getBestTime() {
            const key = `memorymatch_best_${currentLevel}`;
            const saved = localStorage.getItem(key);
            return saved ? parseInt(saved) : null;
        }

        function saveBestTime(timeMs) {
            const key = `memorymatch_best_${currentLevel}`;
            localStorage.setItem(key, timeMs.toString());
        }

        function updateBestTimeDisplay() {
            const best = getBestTime();
            if (best) {
                const mins = Math.floor(best / 60000);
                const secs = Math.floor((best % 60000) / 1000);
                document.getElementById('best-time').textContent = 
                    `${mins}:${secs.toString().padStart(2, '0')}`;
            }
        }

        // Level selector
        document.querySelectorAll('.level-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentLevel = btn.dataset.level;
                
                // Update grid size for new level
                const level = levels[currentLevel];
                document.getElementById('board').style.gridTemplateColumns = `repeat(${level.cols}, 80px)`;
                
                restartGame();
            });
        });

        // Initialize
        updateBestTimeDisplay();
        initGame();
    </script>
</body>
</html>
